<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff88;
        }

        #scoreboard {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }

        canvas {
            border: 3px solid #00ff88;
            background-color: #0f0f1e;
            box-shadow: 0 0 20px #00ff88;
            cursor: none;
        }

        #controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #00dd77;
            box-shadow: 0 0 10px #00ff88;
        }

        button:active {
            transform: scale(0.95);
        }

        #instructions {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <h1>🏓 PONG GAME</h1>
    <div id="scoreboard">
        Player 1: <span id="player1Score">0</span> | Computer: <span id="player2Score">0</span>
    </div>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <div id="controls">
        <button id="startButton">Start Game</button>
        <button id="resetButton">Reset Game</button>
    </div>
    <div id="instructions">
        <p>Mouse को Canvas पर move करो या UP/DOWN Arrow Keys use करो</p>
        <p>First to 5 points wins!</p>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const context = canvas.getContext('2d');

        // Game states
        const GAME_STATE = {
            IDLE: 0,
            PLAYING: 1,
            PAUSED: 2
        };

        // Game variables
        let gameState = GAME_STATE.IDLE;
        let player1Score = 0;
        let player2Score = 0;

        // Paddle properties
        const paddleWidth = 10;
        const paddleHeight = 80;

        // Player 1 (Left paddle)
        const player1 = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 6
        };

        // Player 2 (Computer - Right paddle)
        const player2 = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 4
        };

        // Ball properties
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 6,
            dx: 5,
            dy: 5,
            speed: 5
        };

        // Mouse position tracking
        let mouseY = canvas.height / 2;
        let keyUpPressed = false;
        let keyDownPressed = false;

        // Mouse move event
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Keyboard events
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                keyUpPressed = true;
            } else if (e.key === 'ArrowDown') {
                keyDownPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp') {
                keyUpPressed = false;
            } else if (e.key === 'ArrowDown') {
                keyDownPressed = false;
            }
        });

        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('resetButton').addEventListener('click', resetGame);

        // Game functions
        function startGame() {
            if (gameState === GAME_STATE.IDLE) {
                gameState = GAME_STATE.PLAYING;
                document.getElementById('startButton').textContent = 'Pause Game';
            } else if (gameState === GAME_STATE.PLAYING) {
                gameState = GAME_STATE.PAUSED;
                document.getElementById('startButton').textContent = 'Resume Game';
            } else if (gameState === GAME_STATE.PAUSED) {
                gameState = GAME_STATE.PLAYING;
                document.getElementById('startButton').textContent = 'Pause Game';
            }
        }

        function resetGame() {
            gameState = GAME_STATE.IDLE;
            player1Score = 0;
            player2Score = 0;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 5;
            ball.dy = 5;
            player1.y = canvas.height / 2 - paddleHeight / 2;
            player2.y = canvas.height / 2 - paddleHeight / 2;
            keyUpPressed = false;
            keyDownPressed = false;
            document.getElementById('startButton').textContent = 'Start Game';
            updateScore();
            draw();
        }

        function updateScore() {
            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;
        }

        function update() {
            if (gameState !== GAME_STATE.PLAYING) return;

            // Update player 1 position based on MOUSE
            // Paddle follows mouse position, centered on mouse
            player1.y = mouseY - player1.height / 2;

            // Arrow keys override mouse control
            if (keyUpPressed) {
                player1.y -= player1.speed;
            }
            if (keyDownPressed) {
                player1.y += player1.speed;
            }

            // Keep player 1 within canvas
            if (player1.y < 0) {
                player1.y = 0;
            } else if (player1.y + player1.height > canvas.height) {
                player1.y = canvas.height - player1.height;
            }

            // Computer AI for player 2
            const paddle2Center = player2.y + player2.height / 2;
            if (paddle2Center < ball.y - 35) {
                player2.y += player2.speed;
            } else if (paddle2Center > ball.y + 35) {
                player2.y -= player2.speed;
            }

            // Keep player 2 within canvas
            if (player2.y < 0) {
                player2.y = 0;
            } else if (player2.y + player2.height > canvas.height) {
                player2.y = canvas.height - player2.height;
            }

            // Update ball position
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.radius < 0 ? ball.radius : canvas.height - ball.radius;
            }

            // Ball collision with player 1 paddle
            if (
                ball.x - ball.radius < player1.x + player1.width &&
                ball.y > player1.y &&
                ball.y < player1.y + player1.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player1.x + player1.width + ball.radius;
                // Add some spin based on where it hits the paddle
                const deltaY = ball.y - (player1.y + player1.height / 2);
                ball.dy = deltaY * 0.08;
            }

            // Ball collision with player 2 paddle
            if (
                ball.x + ball.radius > player2.x &&
                ball.y > player2.y &&
                ball.y < player2.y + player2.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player2.x - ball.radius;
                // Add some spin based on where it hits the paddle
                const deltaY = ball.y - (player2.y + player2.height / 2);
                ball.dy = deltaY * 0.08;
            }

            // Ball collision with left and right walls (scoring)
            if (ball.x - ball.radius < 0) {
                player2Score++;
                updateScore();
                resetBall();
                if (player2Score >= 5) {
                    endGame('Computer');
                }
            } else if (ball.x + ball.radius > canvas.width) {
                player1Score++;
                updateScore();
                resetBall();
                if (player1Score >= 5) {
                    endGame('Player 1');
                }
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 5;
        }

        function endGame(winner) {
            gameState = GAME_STATE.IDLE;
            document.getElementById('startButton').textContent = 'Start Game';
            alert(winner + ' wins!\nFinal Score - Player 1: ' + player1Score + ' | Computer: ' + player2Score);
        }

        function draw() {
            // Clear canvas with dark background
            context.fillStyle = '#0f0f1e';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            context.strokeStyle = '#00ff88';
            context.setLineDash([10, 10]);
            context.beginPath();
            context.moveTo(canvas.width / 2, 0);
            context.lineTo(canvas.width / 2, canvas.height);
            context.stroke();
            context.setLineDash([]);

            // Draw player 1 paddle
            context.fillStyle = '#00ff88';
            context.fillRect(player1.x, player1.y, player1.width, player1.height);

            // Draw player 2 paddle
            context.fillStyle = '#ff00ff';
            context.fillRect(player2.x, player2.y, player2.width, player2.height);

            // Draw ball
            context.fillStyle = '#00ffff';
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            context.fill();

            // Draw glow effect around ball
            context.strokeStyle = 'rgba(0, 255, 255, 0.5)';
            context.lineWidth = 2;
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius + 3, 0, Math.PI * 2);
            context.stroke();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        gameLoop();
        draw();
    </script>
</body>
</html>
